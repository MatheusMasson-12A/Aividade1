<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product List</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <nav>
            <a href="index.html" class="nav-link active">Home</a>
            <a href="form.html" class="nav-link">Register Product</a>
        </nav>
    </header>
    <div class="container list-page">
        <div class="list-container">
            <h1>Product List</h1>
            <div id="products"></div>
        </div>
    </div>

    <!-- The Modal -->
    <div id="descriptionModal" class="modal">
        <div class="modal-content">
            <span class="close-button">&times;</span>
            <p id="modalDescription"></p>
        </div>
    </div>

    <script>
        const modal = document.getElementById("descriptionModal");
        const modalDescription = document.getElementById("modalDescription");
        const closeButton = document.querySelector(".close-button");

        closeButton.onclick = function() {
            modal.style.display = "none";
        }

        window.onclick = function(event) {
            if (event.target == modal) {
                modal.style.display = "none";
            }
        }

        async function fetchProducts() {
            const response = await fetch('/products');
            const products = await response.json();
            const productsDiv = document.getElementById('products');
            productsDiv.innerHTML = '';
            products.forEach(product => {
                const productDiv = document.createElement('div');
                productDiv.className = 'product';
                productDiv.innerHTML = `
                    <h3>${product.name}</h3>
                    <p class="price">R$ ${Number(product.price).toFixed(2)}</p>
                    <div class="product-buttons">
                        <button onclick="showDescription('${product.description.replace(/'/g, "\\'")}')">View Description</button>
                        <button class="delete-button" onclick="deleteProduct(${product.id})">Delete</button>
                    </div>
                `;
                productsDiv.appendChild(productDiv);
            });
        }

        function showDescription(description) {
            modalDescription.textContent = description;
            modal.style.display = "block";
        }

        async function deleteProduct(id) {
            const response = await fetch(`/products/${id}`, { method: 'DELETE' });
            if (response.ok) {
                alert('Product deleted successfully!');
                fetchProducts();
            } else {
                alert('Error deleting product.');
            }
        }

        fetchProducts();
    </script>
</body>
</html>
